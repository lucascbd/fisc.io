server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Servir arquivos estáticos com cache longo
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker sem cache (PWA precisa sempre da versão mais recente)
    location = /firebase-messaging-sw.js {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA — qualquer rota serve o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
